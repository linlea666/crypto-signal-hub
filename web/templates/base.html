<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CryptoSignal Hub{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ ASSET_VERSION }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">◈ CSH</a>

        <div class="coin-tabs">{% block coin_tabs %}{% endblock %}</div>

        <div class="nav-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">大屏</a>
            <a href="/executor" class="{% if request.url.path == '/executor' %}active{% endif %}">执行</a>
            <a href="/history" class="{% if request.url.path == '/history' %}active{% endif %}">历史</a>
            <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">日志</a>
            <a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}">配置</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js?v={{ ASSET_VERSION }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
