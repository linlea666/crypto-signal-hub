<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CryptoSignal Hub{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">
                <span class="brand-icon">◈</span>
                <span>CryptoSignal Hub</span>
            </a>

            {% block coin_tabs %}{% endblock %}

            <div class="nav-links">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">大屏</a>
                <a href="/history" class="{% if request.url.path == '/history' %}active{% endif %}">历史</a>
                <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">日志</a>
                <a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}">配置</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>CryptoSignal Hub v0.1.0</span>
        <span class="footer-sep">·</span>
        <span>OKX / Binance / Deribit / Yahoo</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
